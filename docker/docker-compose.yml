services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: app
    env_file:
      - ../.env.production
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/hook"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
